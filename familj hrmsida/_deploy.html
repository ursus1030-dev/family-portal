function log(msg) { document.getElementById('log').textContent += msg + "\n"; }

async function deploy() {
  if (!TOKEN) { log("No token!"); return; }
  
  log("Step 1: Getting site ID...");
  const sitesR = await fetch("https://api.netlify.com/api/v1/sites", {
    headers: { "Authorization": "Bearer " + TOKEN }
  });
  const sites = await sitesR.json();
  if (!Array.isArray(sites)) { log("Error: " + JSON.stringify(sites)); return; }
  const site = sites.find(s => s.name && s.name.includes("candid-elf"));
  if (!site) { log("Site not found. Sites: " + sites.map(s=>s.name).join(",")); return; }
  log("Site: " + site.name + " (" + site.id + ")");

  log("Step 2: Hashing " + Object.keys(FILES_B64).length + " files...");
  const fileMap = {};
  const fileBuffers = {};
  for (const [name, b64] of Object.entries(FILES_B64)) {
    const bin = atob(b64);
    const buf = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) buf[i] = bin.charCodeAt(i);
    fileBuffers[name] = buf.buffer;
    const hash = await crypto.subtle.digest("SHA-1", buf.buffer);
    fileMap["/" + name] = Array.from(new Uint8Array(hash)).map(b=>b.toString(16).padStart(2,"0")).join("");
  }

  log("Step 3: Creating deploy...");
  const deployR = await fetch("https://api.netlify.com/api/v1/sites/" + site.id + "/deploys", {
    method: "POST",
    headers: { "Authorization": "Bearer " + TOKEN, "Content-Type": "application/json" },
    body: JSON.stringify({ files: fileMap })
  });
  const deploy = await deployR.json();
  if (!deploy.id) { log("Deploy error: " + JSON.stringify(deploy)); return; }
  log("Deploy ID: " + deploy.id + ", required: " + (deploy.required||[]).length + " files");

  log("Step 4: Uploading files...");
  const sha1ToFile = {};
  for (const [path, sha1] of Object.entries(fileMap)) sha1ToFile[sha1] = path.substring(1);
  for (const sha1 of (deploy.required || [])) {
    const filename = sha1ToFile[sha1];
    if (!filename) continue;
    log("  Uploading: " + filename);
    await fetch("https://api.netlify.com/api/v1/deploys/" + deploy.id + "/files/" + filename, {
      method: "PUT",
      headers: { "Authorization": "Bearer " + TOKEN, "Content-Type": "application/octet-stream" },
      body: fileBuffers[filename]
    });
  }
  log("DONE! Deploy state: " + deploy.state);
  log("URL: " + (deploy.ssl_url || deploy.deploy_url || "https://candid-elf-1749d5.netlify.app"));
  document.title = "Deploy Complete!";
}
deploy();
