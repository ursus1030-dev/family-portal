<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<title>Netlify Uploader</title>
<style>
  body { font-family: monospace; background: #1a1a2e; color: #eee; padding: 2rem; }
  h2 { color: #7ec8e3; }
  #drop { border: 2px dashed #7ec8e3; padding: 2rem; margin: 1rem 0; border-radius: 8px; }
  input[type=file] { display: block; margin: 1rem 0; color: #eee; }
  button { background: #3D5C3A; color: #fff; border: none; padding: 0.6rem 1.4rem; border-radius: 6px; cursor: pointer; font-size: 1rem; margin-top: 0.5rem; }
  button:hover { background: #4e7349; }
  #log { margin-top: 1.5rem; max-height: 60vh; overflow-y: auto; }
  .ok  { color: #7ec87e; }
  .err { color: #e37e7e; }
  .inf { color: #aaa; }
</style>
</head>
<body>
<h2>🚀 Netlify Deploy Uploader</h2>
<p class="inf">Deploy ID: <strong id="did">6a17d28efc93b422be55f351</strong></p>
<input type="file" id="fileInput" multiple accept=".html">
<button onclick="startUpload()">Ladda upp markerade filer</button>
<div id="log"></div>

<script>
const DEPLOY_ID = "6a17d28efc93b422be55f351";
const TOKEN     = "nfp_2QW7rSocuTWtziuTANbJNkK5mu9DEe9ufcc6";
window._results = {};

function log(msg, cls) {
  const d = document.getElementById("log");
  const p = document.createElement("p");
  p.className = cls || "inf";
  p.textContent = msg;
  d.appendChild(p);
  d.scrollTop = d.scrollHeight;
}

async function startUpload() {
  const files = document.getElementById("fileInput").files;
  if (!files.length) { log("Inga filer valda!", "err"); return; }
  log(`Startar uppladdning av ${files.length} fil(er)...`);

  for (const file of files) {
    log(`→ Laddar upp ${file.name} (${(file.size/1024).toFixed(1)} KB)...`);
    try {
      const buf = await file.arrayBuffer();
      const resp = await fetch(
        `https://api.netlify.com/api/v1/deploys/${DEPLOY_ID}/files/${file.name}`,
        {
          method: "PUT",
          headers: {
            "Content-Type": "application/octet-stream",
            "Authorization": `Bearer ${TOKEN}`
          },
          body: buf
        }
      );
      const status = resp.status;
      window._results[file.name] = status;
      if (status === 200) {
        log(`✅ ${file.name}: ${status} OK`, "ok");
      } else {
        const txt = await resp.text();
        log(`❌ ${file.name}: ${status} – ${txt.slice(0,120)}`, "err");
      }
    } catch(e) {
      log(`❌ ${file.name}: FEL – ${e.message}`, "err");
      window._results[file.name] = "error";
    }
  }

  log("─── Klar! Resultat i window._results ───", "ok");
}
</script>
</body>
</html>
