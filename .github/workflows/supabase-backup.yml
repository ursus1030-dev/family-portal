name: Supabase nattlig backup

on:
  schedule:
    - cron: '0 7 * * *'   # 07:00 UTC = 09:00 svensk sommartid (08:00 vintertid)
  workflow_dispatch:       # Möjlighet att köra manuellt

# Krävs för att git push ska fungera — utan detta är GITHUB_TOKEN skrivskyddad
# och commit-steget dör med exit 128 (rootcause till att alla körningar failat sedan 2026-06-03)
permissions:
  contents: write

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Checka ut repot
        uses: actions/checkout@v4

      - name: Hämta data från Supabase och spara backup
        env:
          SUPABASE_URL: https://vnxadbborwnfnenjnakm.supabase.co
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          DATE=$(date +%Y-%m-%d)
          mkdir -p backups

          python3 << 'EOF'
          import urllib.request, json, os
          from datetime import date

          SUPABASE_URL = os.environ['SUPABASE_URL']
          ANON_KEY = os.environ['SUPABASE_ANON_KEY']

          tables = [
            'foton','memories','recept','minnesladan','tidskapslar',
            'boktips','dialekt_ord','filmer','fiskerekord','kalender_events',
            'karta_platser','quiz_citat','quiz_poang','resor','slakt_noter',
            'sopor','talamod','visdom_answers','visdom_questions'
          ]

          backup = {}
          summary = []

          for table in tables:
              url = f'{SUPABASE_URL}/rest/v1/{table}?select=*&limit=10000'
              req = urllib.request.Request(url, headers={
                  'apikey': ANON_KEY,
                  'Authorization': f'Bearer {ANON_KEY}'
              })
              try:
                  with urllib.request.urlopen(req, timeout=15) as resp:
                      data = json.loads(resp.read())
                      backup[table] = data
                      summary.append(f'  {table}: {len(data)} rader')
              except Exception as e:
                  backup[table] = []
                  summary.append(f'  {table}: FEL — {e}')

          today = date.today().isoformat()
          path = f'backups/backup-{today}.json'
          with open(path, 'w', encoding='utf-8') as f:
              json.dump(backup, f, ensure_ascii=False, indent=2, default=str)

          print(f'Backup sparad: {path}')
          print('\n'.join(summary))
          EOF

      - name: Committa backup-filen
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          DATE=$(date +%Y-%m-%d)
          git add backups/backup-$DATE.json
          git diff --cached --quiet || git commit -m "Automatisk Supabase-backup $DATE"
          git push
